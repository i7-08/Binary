<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Binary Converter — Modern Developer Utility</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-color: #4f46e5;
            --accent-hover: #4338ca;
            --subtle-bg: #f1f5f9;
            --radius: 12px;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #0b0f19;
                --card-bg: #111827;
                --text-main: #f9fafb;
                --text-muted: #9ca3af;
                --border-color: #1f2937;
                --accent-color: #6366f1;
                --accent-hover: #4f46e5;
                --subtle-bg: #1f2937;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            transition: background-color 0.3s ease;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 0.25rem;
        }

        header p {
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .workspace {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }

        @media (min-width: 768px) {
            .workspace {
                grid-template-columns: 1fr 1fr;
            }
        }

        .panel {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
        }

        .toolbar {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            background: var(--subtle-bg);
            border: none;
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .action-btn:hover {
            background: var(--accent-color);
            color: white;
        }

        .textarea-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 220px;
            padding: 14px;
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-main);
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 0.9rem;
            resize: none;
            outline: none;
            line-height: 1.6;
            transition: var(--transition);
        }

        textarea:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .panel-footer {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0 4px;
        }

        /* Toast system */
        .toast {
            position: fixed;
            bottom: 24px;
            background: #1e293b;
            color: #ffffff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition);
            pointer-events: none;
            z-index: 10;
        }

        .toast.visible {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Binary Converter</h1>
            <p>Real-time translation hub for text data and raw binary strings</p>
        </header>

        <div class="workspace">
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Plain Text</span>
                    <div class="toolbar">
                        <button class="action-btn" onclick="copyContent('textInput')">Copy</button>
                        <button class="action-btn" onclick="downloadContent('textInput', 'text.txt')">Save .txt</button>
                        <button class="action-btn" onclick="clearContent('textInput')">Clear</button>
                    </div>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="textInput" placeholder="Type or drop plain text content here..." oninput="syncToBinary()"></textarea>
                </div>
                <div class="panel-footer">
                    <span id="textCount">0 characters</span>
                </div>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Binary Code</span>
                    <div class="toolbar">
                        <button class="action-btn" onclick="copyContent('binaryInput')">Copy</button>
                        <button class="action-btn" onclick="downloadContent('binaryInput', 'binary.txt')">Save .txt</button>
                        <button class="action-btn" onclick="clearContent('binaryInput')">Clear</button>
                    </div>
                </div>
                <div class="textarea-wrapper">
                    <textarea id="binaryInput" placeholder="01000001 01000010..." oninput="syncToText()"></textarea>
                </div>
                <div class="panel-footer">
                    <span id="binaryCount">0 bits</span>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">Copied to clipboard!</div>

    <script>
        function syncToBinary() {
            const text = document.getElementById('textInput').value;
            const binaryInput = document.getElementById('binaryInput');
            
            if (!text) {
                binaryInput.value = '';
                updateCounters();
                return;
            }

            binaryInput.value = text.split('')
                .map(char => char.charCodeAt(0).toString(2).padStart(8, '0'))
                .join(' ');
                
            updateCounters();
        }

        function syncToText() {
            const binary = document.getElementById('binaryInput').value.trim();
            const textInput = document.getElementById('textInput');

            if (!binary) {
                textInput.value = '';
                updateCounters();
                return;
            }

            try {
                const segments = binary.split(/\s+/);
                const translated = segments.map(bin => {
                    if (!/^[01]+$/.test(bin)) return ''; 
                    return String.fromCharCode(parseInt(bin, 2));
                }).join('');
                
                textInput.value = translated;
            } catch (e) {
                // Gracefully hold process mid-input string adjustments
            }
            updateCounters();
        }

        function updateCounters() {
            const text = document.getElementById('textInput').value;
            const binary = document.getElementById('binaryInput').value;
            
            document.getElementById('textCount').textContent = `${text.length} character${text.length !== 1 ? 's' : ''}`;
            
            // Clean bits calculations discarding spacing structure
            const bitLength = binary.replace(/[^01]/g, '').length;
            document.getElementById('binaryCount').textContent = `${bitLength} bit${bitLength !== 1 ? 's' : ''}`;
        }

        function copyContent(id) {
            const target = document.getElementById(id);
            if (!target.value) return;
            
            navigator.clipboard.writeText(target.value).then(() => {
                showToast("Copied to your clipboard!");
            });
        }

        function clearContent(id) {
            document.getElementById(id).value = '';
            syncToBinary();
            syncToText();
        }

        function downloadContent(id, filename) {
            const content = document.getElementById(id).value;
            if (!content) return;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('visible');
            setTimeout(() => toast.classList.remove('visible'), 2000);
        }
    </script>
</body>
</html>
